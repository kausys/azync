name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Test
        run: |
          go test -race ./...
          (cd driver/azyncpgx && go test -race ./...)
          (cd examples && go test -race ./...)

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --config ${{ github.workspace }}/.golangci.yml

      - name: Lint driver/azyncpgx
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: driver/azyncpgx
          args: --config ${{ github.workspace }}/.golangci.yml

      - name: Lint examples
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: examples
          args: --config ${{ github.workspace }}/.golangci.yml

      # release-please also mirrors driver/azyncpgx/vX.Y.Z on release_created; keep
      # this for manual v* tags and make it idempotent so re-runs do not fail with
      # "tag already exists" (exit 128).
      - name: Create sub-module tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SUB_TAG="driver/azyncpgx/${TAG}"
          if git rev-parse "refs/tags/${SUB_TAG}" >/dev/null 2>&1; then
            echo "${SUB_TAG} already exists — skip"
            exit 0
          fi
          git tag "${SUB_TAG}"
          git push origin "${SUB_TAG}"
