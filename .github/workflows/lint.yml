name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - .
          - driver/azyncpgx
          - examples

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: ${{ matrix.module }}
          args: --config ${{ github.workspace }}/.golangci.yml
          # Keep in sync with GOLANGCI_LINT_VERSION in run.sh — otherwise CI
          # floats to whatever the action defaults to while local lint stays
          # pinned, and the two can drift.
          version: v2.12.2
